
  <form [formGroup]="formPaymentMethod" (ngSubmit)="addPaymentMethod()"
    style="display: flex; flex-direction: column; gap: 16px">
    <div #paymentMethod></div>
    @if (!isLoading()) {
    <ion-grid class="ion-no-padding">
      <ion-row>
        <ion-col size="12">
          <ion-button type="submit" expand="block" color="tertiary">{{
            'add-payment-method' | translate
            }}</ion-button>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col>
          <ion-button (click)="clearFields()" color="secondary" shape="outline" expand="block">{{
            'clear' | translate
            }}</ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
    }
  </form>
