<form
  [formGroup]="formPaymentMethod"
  (ngSubmit)="addPaymentMethod()"
  style="display: flex; flex-direction: column; gap: 16px"
>
  <div #paymentMethod></div>
  @if (!isLoading()) {

  <div class="actions">
    <ion-button (click)="clearFields()" shape="outline" expand="block">{{
      'clear' | translate
    }}</ion-button>
    <ion-button type="submit" expand="block" color="tertiary">{{
      'add-payment-method' | translate
    }}</ion-button>
  </div>

  }
</form>
