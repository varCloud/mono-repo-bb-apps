<div class="radio-card-container">
  @for (option of options(); track option.value) {
    <div 
      class="radio-card"
      [class.selected]="selectedValue === option.value"
      [class.disabled]="disabled() || option.disabled"
      [attr.data-gender]="option.value"
      (click)="selectOption(option.value)">
      
      <div class="card-content">
        <!-- Usar imagen si está disponible, sino usar icono -->
        @if (option.image) {
          <img [src]="option.image" [alt]="option.label" class="card-image" />
        }
        @if (option.icon && !option.image) {
          <ion-icon [name]="option.icon"></ion-icon>
        }
        <span class="card-label">{{ option.label | translate }}</span>
        @if (option.description) {
          <p class="card-description">{{ option.description | translate }}</p>
        }
      </div>
      
      <!-- Radio button oculto para mantener funcionalidad -->
      <input 
        type="radio" 
        [value]="option.value" 
        [checked]="value() === option.value"
        [disabled]="disabled() || option.disabled"
        style="display: none;">
    </div>
  }
</div>
