<div class="exercise-form">
  <ion-accordion-group style="padding: 0">
    <ion-accordion
      toggleIconSlot="start"
      [value]="'exercise' + exerciseNumber"
      [ngClass]="{ 'upload-error': isUploadError() }"
      style="margin-bottom: 0"
    >
      <ion-item slot="header" [color]="isUploadError() ? 'danger' : null">
        <ion-label>
          {{ isDocument ? 'Documento' : 'Ejercicio' }}
          {{ exerciseNumber }}</ion-label
        >
        @if( showIconDelete ){
        <ion-icon
          name="trash-outline"
          slot="end"
          color="danger"
          (click)="removeExercise($event)"
        ></ion-icon>
        }
      </ion-item>

      <div slot="content" class="accordion-content">
        <form [formGroup]="exerciseForm()" class="form-container">
          <!-- Nombre del ejercicio -->
          <div class="form-field">
            <ion-input
              formControlName="name"
              class="bb-input"
              placeholder="Escribe el nombre del ejercicio"
              [label]="'Nombre'"
              fill="outline"
               label-placement="floating"
              mode="md"
            ></ion-input>
            <app-error-message
              [control]="exerciseForm().get('name')!"
            ></app-error-message>
          </div>

          <!-- Descripción del ejercicio -->
          @if(showDescription){
          <div class="form-field">
            <ion-textarea
              formControlName="description"
              class="bb-input"
              [label]="'Descripcion'"
              placeholder="Escribe una breve descripción del ejercicio"
              fill="outline"
              [maxlength]="255"
              [counter]="true"
              mode="md"
              [autoGrow]="true"
              label-placement="floating"
            ></ion-textarea>
            <app-error-message
              [control]="exerciseForm().get('description')!"
            ></app-error-message>
          </div>
          }
          <!--  -->
          @if (!hideCoverUpload()) {
          <app-dashed-area 
            [label]="
              isDocument
                ? 'Sube un documento PDF'
                : 'Carga el video de tu ejercicio'
            "
          (clickEvent)="abrirExplorer()"></app-dashed-area>
          }

          <!-- Uppy Dashboard para subida de video -->
           <div class="message-format">
             <span>carga un arhivo .mp4 o .mov</span>
           </div>
          <div
            class="video-upload"
            [style.display]="hideCoverUpload() ? 'block' : 'none'"
          >
            <div id="uppy-dashboard{{ exerciseNumber }}" #uppyDashboard></div>
          </div>
        </form>
      </div>
    </ion-accordion>
  </ion-accordion-group>
</div>
