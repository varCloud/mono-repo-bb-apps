<ion-header>
  <ion-toolbar>
    <ion-searchbar
      [placeholder]="'Buscar'"
      [mode]="'ios'"
      [debounce]="300"
      show-cancel-button="always"
      [cancelButtonText]="'cancel'"
      (ionCancel)="dismiss()"
      (ionInput)="onSearchChange($event)"
    ></ion-searchbar>
  </ion-toolbar>
</ion-header>
<div class="scroll" style="overflow: scroll">
  @for (sub of filteredSubscriptions(); track sub) {
  <lib-user-card
    [imageUrl]="sub.user.profilePictureUrl"
    [name]="sub.user.name"
    [nickName]="sub.user.nickName"
    [descriptionPlan]="'Pago por 3 meses'"
    class="card-item"
  ></lib-user-card>
  }@empty { sin resultados }
</div>
