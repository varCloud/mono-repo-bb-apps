<app-modal-header-searchbar
  [titleText]="'subscriptions.search-title' | translate"
  [placeholderText]="'subscriptions.find-subscription' | translate"
  (dismiss)="dismiss()"
  (search)="onSearch($event)"
></app-modal-header-searchbar>

<ion-content class="ion-padding">
  <div class="scroll" >
    @for (sub of subscriptions(); track sub) {
    <lib-user-card 
      [imageUrl]="sub.user.profilePictureUrl" 
      [name]="sub.user.name" [nickName]="sub.user.nickName"
      [descriptionPlan]="sub.fullDescription" class="card-item" 
      [email]="sub.user.email" 
      [endData]="sub.nextPaymentDate"
      [amount]="sub.amount"
      [showOptions]="false"
      ></lib-user-card>
    }@empty {
      @if(!this._loaderUIService.getLoading()){
       <lib-empty-elements-component [message]="this.messsageList| translate">
      </lib-empty-elements-component> 
      }
    }
  </div>
</ion-content>
