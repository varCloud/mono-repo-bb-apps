<ion-header>
  <ion-toolbar>
    <ion-searchbar
      [placeholder]="'Buscar'"
      [mode]="'ios'"
      [debounce]="300"
      show-cancel-button="always"
      [cancelButtonText]="'cancel'"
      (ionCancel)="dismiss()"
      (ionInput)="onSearchChange($event)"
    ></ion-searchbar>
  </ion-toolbar>
</ion-header>
<div class="scroll" style="overflow: scroll">
  @for (sub of filteredSubscriptions(); track sub) {
 <lib-user-card
        [imageUrl]="sub.user.profilePictureUrl"
        [name]="sub.user.name"
        [nickName]="sub.user.nickName"
        [descriptionPlan]="sub.fullDescription"
        class="card-item"
      [email]="sub.user.email"
      [endData] = "sub.endDate"
      [amount] = "sub.amount"

      ></lib-user-card>
  }@empty {
   <ion-row class="no-results-text center-text"
      ><ion-col><p style="text-align: center;">  No se encontraron suscriptores</p>

        </ion-col>
    </ion-row>
  }
</div>
