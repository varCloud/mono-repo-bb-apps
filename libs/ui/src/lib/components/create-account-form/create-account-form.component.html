<form [formGroup]="createAccountForm" (ngSubmit)="onSubmit()">
  <ion-grid>
    <ion-row>
      <ion-col size="12">
        <ion-input
          formControlName="email"
          class="bb-input"
          [label]="'mail' | translate"
          label-placement="floating"
          fill="outline"
          [placeholder]="'mail-placeholder' | translate"
          [errorText]="'error.email-required' | translate"
          type="email"
          mode="md"
        ></ion-input>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <ion-input
          formControlName="passwordHash"
          class="bb-input"
          [label]="'password' | translate"
          label-placement="floating"
          fill="outline"
          [maxlength]="20"
          [placeholder]="'password' | translate"
          type="password"
          [errorText]="'error.password-required' | translate"
          mode="md"
        >
          @if (createAccountForm.get('passwordHash')?.value) {
            <ion-input-password-toggle slot="end" [color]="'secondary'"></ion-input-password-toggle>
          }
        </ion-input>
      </ion-col>
      <ion-col size="12">
        <lib-terms-and-conditions
          [termsControl]="$any(createAccountForm.get('terms'))"
        ></lib-terms-and-conditions>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <ion-button
          color="tertiary"
          class="bb-input ion-margin-top"
          expand="block"
          shape="round"
          type="submit"
          [disabled]="createAccountForm.invalid"
        >
          {{ 'user-create-account.create-account' | translate }}
        </ion-button>
      </ion-col>
    </ion-row>
  </ion-grid>
</form>
