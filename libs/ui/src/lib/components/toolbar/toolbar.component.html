<ion-item lines="full">
  @if (backLink()!=='') {
    <ion-button size = "small" (click)="onBackClick()" fill="clear" class="backLink" >
      <ion-icon [name]="leftIcon()" slot="start" aria-hidden="false" color="medium" class="backButton"></ion-icon>{{ title() }}
    </ion-button>
  }
  @if(title()!==''){
    <ion-label for="backLink">
      <div class="title"></div>
    </ion-label>
  }

   @if(phoneLink()!==''){

    <ion-button  [href]="'tel:' + phoneLink()" fill="clear" class="radius-border" size="small">
      <ion-icon slot="icon-only" [name]="phoneIcon()" color="primary" class="icon-toolbar"></ion-icon>
    </ion-button>

  }

  @if(emailLink()!==''){
    <ion-button  [href]="'mailto:' + emailLink()" fill="clear" class="radius-border" size="small">
      <ion-icon slot="icon-only" [name]="emailIcon()" color="primary" class="icon-toolbar"></ion-icon>
    </ion-button>
  }

</ion-item>
