<ion-radio-group [value]="value()" (ionChange)="onSelectionChange($event)">
  <ion-item 
    *ngFor="let option of options()" 
    [class]="itemClass()"
    [disabled]="disabled() || option.disabled">
    <ion-icon 
      *ngIf="option.icon" 
      [name]="option.icon" 
      slot="start">
    </ion-icon>
    <ion-radio 
      slot="start" 
      [value]="option.value" 
      [disabled]="disabled() || option.disabled">
    </ion-radio>
    <ion-label>
      {{ option.label | translate }}
      <p *ngIf="option.description">{{ option.description | translate }}</p>
    </ion-label>
  </ion-item>
</ion-radio-group>
