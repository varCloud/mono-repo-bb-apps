<ion-card class="card-list-container" (click)="onCardClick()">
  <div class="image-container">
    <ion-img [src]="workout().workoutUrl" alt="Tabata" class="card-image" />
    <div></div>
    <span class="likes-counter">
      <ion-icon name="heart"></ion-icon>
      {{ workout().totalLikes }} Seguidores @if(showLevel()){
      <span class="level-badge">{{ workout().totalRatings }}</span>
      }
    </span>
    <span class="category" [ngClass]="['category-' + (this.workout().difficultyLevels.length || 0)]">
      {{ level() || "Recomendadacion" }}
    </span>

    @if (isCreator()) {
      <div 
        class="delete-badge" 
        role="button"
        tabindex="0"
        (click)="onDeleteWorkout($event)"
        (keyup.enter)="onDeleteWorkout($event)"
        (keyup.space)="onDeleteWorkout($event)"
        aria-label="Eliminar entrenamiento"
      >
        <ion-icon name="trash-outline"></ion-icon>
      </div>
    }
  </div>
  <ion-card-content style="padding: 3px 0px 16px 8px" class="card-subtitle">
    <div style="width: 70%">
      <ion-card-title class="card-title">{{ workout().title }}</ion-card-title>
      <ion-card-subtitle  class="subtitle-email">{{ tags() }}</ion-card-subtitle>
      <ion-card-subtitle class="subtitle-email">Coach: {{ workout().creatorNickName }}</ion-card-subtitle>
    </div>
    @if (useBookmark()) {
    <ion-button
      fill="clear"
      size="small"
      class="bookmark-btn"
      (click)="toggleFavorite($event)"
    >
      <ion-icon
        [name]="isFavorite() ? 'bookmark' : 'bookmark-outline'"
        [color]="isFavorite() ? 'primary' : 'medium'"
        class="bookmark-icon"
      ></ion-icon>
    </ion-button>
    }
  </ion-card-content>
</ion-card>
