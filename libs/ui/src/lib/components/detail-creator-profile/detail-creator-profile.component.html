<ion-content
  class="detail-creator-profile-content ion-no-padding"
  [fullscreen]="true"
>
  <img
    src="https://bb-app-bucket-images.s3.amazonaws.com/uploads%2F76%2Fundefined%2Fphoto-7_1761612307696_j5qjqz2qhtf.jpg"
    alt=""
    style="
      width: 100%;
      height: 200px;
      object-fit: cover;
      object-position: center;
    "
  />
  <app-layout-content customClass="detail-creator-profile-page ion-padding">
    <ion-grid content-body>
      <div class="header-creator-profile">
        <ion-avatar class="avatar-creator-profile">
          <img
            alt="Silhouette of a person's head"
            [src]="creator()?.profilePictureUrl || defaultProfilePicture"
          />
        </ion-avatar>

        <div class="info-creator-profile">
          <div class="info-creator-profile-header">
            <h2 class="name">{{ fullName() }}</h2>
            <ion-button
              size="small"
              color="tertiary"
              shape="round"
              class="btn-suscription"
              (click)="goToSuscriptionCreator()"
            >
              Suscribirse
            </ion-button>
          </div>
          <p class="bio">{{ creator()?.bio }}</p>
        </div>

        <div class="categories-creator-profile">
          @for (category of creator()?.categories; track category.categoryId) {
          <ion-chip [outline]="true" class="chip">
            <ion-label>{{ category.name }}</ion-label>
          </ion-chip>
          }
        </div>
      </div>
      <div class="segment-creator-profile">
        <ion-segment mode="md" (ionChange)="changeTab($event)">
          <ion-segment-button
            [value]="WORKOUT_TYPES.RUTINE_VIDEO"
            content-id="first"
          >
            <ion-label class="no-transform title">Entrenamientos</ion-label>
          </ion-segment-button>
          <ion-segment-button
            [value]="WORKOUT_TYPES.DOCUMENT"
            content-id="second"
          >
            <ion-label class="no-transform title">Documentos</ion-label>
          </ion-segment-button>
        </ion-segment>
        <ion-segment-view>
          <ion-segment-content id="first">
            @for (workout of workouts(); track workout.workoutId) {
            <lib-card-workout-info [workout]="workout"></lib-card-workout-info>
            }
          </ion-segment-content>
          <ion-segment-content id="second">Second</ion-segment-content>
        </ion-segment-view>
      </div>
    </ion-grid>
    <div content-footer class="ion-text-center"></div>
  </app-layout-content>
  <ion-infinite-scroll (ionInfinite)="onIonInfinite($event)">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
