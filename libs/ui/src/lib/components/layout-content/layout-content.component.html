<div
  class="layout-content {{ useSafeArea() ? 'safe-area-padding' : '' }} "
  [ngClass]="[customClass()]"
>
  <div>
    @if (useGoBack()) {
      <div class="go-back">
        <ion-back-button
          icon="arrow-back-outline"
          [defaultHref]="defaultHref()"
          class="ion-no-padding bb-goback"
          uppercase="false"
          [text]="title()"
          (click)="onGoBackClick()"
        ></ion-back-button>
      </div>
    } @else {
      <div class="divider"></div>
    }
    <ng-content select="[content-header]"></ng-content>
    <ng-content select="[content-body]"></ng-content>
  </div>
  <div class="layout-content-footer">
    <ng-content select="[content-footer]"></ng-content>
  </div>
</div>
