<ion-grid
  class="categories-select-content"
  *blockUI="'categories-select-component'; template: listSkeletonTemplate"
>
  <ion-row>
    <ion-col size="12">
      <ion-text class="max-categories-text">
        <p>
          {{
            "categories.max-categories-selected"
              | translate: { limit: limitSelected() }
          }}
        </p>
      </ion-text>
    </ion-col>
    <ion-col size="12">
      @for (categorie of categories(); track categorie.categoryId) {
        <ion-item (click)="selectCategory(categorie)">
          <ion-checkbox
            class="bb-checkbox"
            labelPlacement="end"
            [(ngModel)]="categorie.selected"
          >
            {{ categorie.name }}
          </ion-checkbox>
        </ion-item>
      }
    </ion-col>
  </ion-row>
</ion-grid>
