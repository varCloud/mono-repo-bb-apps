<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
  <ion-grid>
    <ion-row>
      <ion-col size="12">
        <ion-input
          formControlName="email"
          class="bb-input"
          [label]="'mail' | translate"
          label-placement="floating"
          fill="outline"
          [placeholder]="'mail-placeholder' | translate"
          mode="md"
        ></ion-input>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <ion-input
          formControlName="password"
          class="bb-input"
          [label]="'password' | translate"
          label-placement="floating"
          fill="outline"
          [maxlength]="20"
          [placeholder]="'password' | translate"
          type="password"
          mode="md"
        >
          @if (loginForm.get("password")?.value) {
          <ion-input-password-toggle
            slot="end"
            [color]="'secondary'"
          ></ion-input-password-toggle>
          }
        </ion-input>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <ion-button
          [disabled]="loginForm.invalid"
          shape="round"
          expand="block"
          color="tertiary"
          type="submit"
          >{{ 'login.login' | translate }}</ion-button
        >
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col size="12" class="ion-text-center">
        <ion-button fill="clear" (click)="onRecoverPassword()"
          ><span class="question link">{{
            'login.recover-password' | translate
          }}</span></ion-button
        >
      </ion-col>
    </ion-row>
  </ion-grid>
</form>
