  <ion-button (click)="openConnectionModal()">Abrir Buscador</ion-button>

  <ion-modal
    [isOpen]="isOnline$"
    [breakpoints]="[0, 0.25, 0.5, 0.75, 1]"
    [initialBreakpoint]="0.5"
    class="search-modal"
    (didDismiss)="onModalDismiss($event)"
  >
    <ng-template>
      <ion-content class="ion-padding">
        <h2>Buscador</h2>
        <p>Aquí va el contenido de tu ConnectionDetectorService visualmente.</p>

        <ion-button (click)="isSearchModalOpen = false">Cerrar sin datos</ion-button>

        </ion-content>
    </ng-template>
  </ion-modal>
