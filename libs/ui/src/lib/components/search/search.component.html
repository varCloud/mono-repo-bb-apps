<div class="search-component-container">
  <ion-text>
    <h2 class="search-component-title">{{ headerTitle() }}</h2>
  </ion-text>

  <ion-searchbar
    style="--background: #ffffff"
    [value]="searchValue()"
    [placeholder]="placeholder()"
    [debounce]="debounce()"
    (ionInput)="onSearchInput($event)"
    (ionClear)="onSearchClear()"
    (ionChange)="onSearchSubmit($event)"
  >
  </ion-searchbar>
</div>
