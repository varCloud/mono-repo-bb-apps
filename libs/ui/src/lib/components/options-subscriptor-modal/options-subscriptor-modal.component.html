<div class="modal-content">
  <div class="drag-handle"></div>

  @if (viewState() === 'options') {
    <div class="options-view">
      <div class="option-item" (click)="showConfirmView()">
        <ion-icon name="close" color="danger"></ion-icon>
        <span>Cancelar suscripción</span>
      </div>
    </div>
  }

  @if (viewState() === 'confirm') {
    <div class="confirm-view">
      <h2>¿Estas seguro que deseas cancelar el plan de suscripción?</h2>
      <p>Esta acción no puede ser revertida</p>

      <div class="button-group">
        <ion-button fill="outline" shape="round" (click)="showOptionsView()">
          Cancelar
        </ion-button>

        <ion-button
          fill="solid"
          shape="round"
          color="primary"
          (click)="confirmCancellation()">
          Si, Cancelar plan
        </ion-button>
      </div>
    </div>
  }
</div>
