<div class="catalog-select-container">
  <ng-select
    [items]="data()"
    [bindLabel]="blindLabel()"
    [multiple]="true"
    [closeOnSelect]="false"
    [searchable]="false"
    [placeholder]="placeholder() | translate"
    [formControl]="control()"
    class="catalog-ng-select"
  >
    <ng-template ng-multi-label-tmp let-items="items" let-clear="clear">
      @for (item of items | slice: 0 : 6; track item) {
      <div class="ng-value">
        <span class="ng-value-label">{{ $any(item)[blindLabel()] }}</span>
        <span
          class="ng-value-icon right"
          (click)="clear(item)"
          aria-hidden="true"
          >×</span
        >
      </div>
      } @if (items.length > 6) {
      <div class="ng-value">
        <span class="ng-value-label">{{ items.length - 2 }} more...</span>
      </div>
      }
    </ng-template>
  </ng-select>
  <app-error-message [control]="control()"></app-error-message>
  @if (useIonSelect()) {
  <ion-list>
    <ion-item>
      <ion-select
        mode="md"
        [multiple]="true"
        aria-label="fruit"
        [label]="'workout.routine.difficulty' | translate"
        fill="outline"
        justify="space-between"
        [placeholder]="'workout.routine.difficulty-placeholder' | translate"
        [formControl]="control()"
      >
        @for (option of data(); track $index) {
        <ion-select-option [value]="option[blindValue()]">
          {{ option[blindLabel()] }}
        </ion-select-option>
        }
      </ion-select>
    </ion-item>
  </ion-list>
  }
</div>
