<div class="modal-content">
  <div class="drag-handle"></div>

  @if (viewState() === 'options') {
    <div class="options-view">
      <div class="option-item" (click)="setAsDefault()">
        <ion-icon name="checkmark-circle-outline" color="success"></ion-icon>
        <span>Establecer como principal</span>
      </div>
      <div class="option-item" (click)="showConfirmView()">
        <ion-icon name="trash-outline" color="danger"></ion-icon>
        <span>Eliminar método de pago</span>
      </div>
    </div>
  }

  @if (viewState() === 'confirm') {
    <div class="confirm-view">
      <h2>¿Estás seguro que deseas eliminar este método de pago?</h2>
      <p>Esta acción no puede ser revertida.</p>
      <div class="button-group">
        <ion-button fill="outline" shape="round" (click)="showOptionsView()">
          Cancelar
        </ion-button>

        <ion-button
          fill="solid"
          shape="round"
          color="danger"
          (click)="confirmDelete()">
          Sí, Eliminar
        </ion-button>
      </div>
    </div>
  }
</div>
