<div class="faq-header">
  <h2>{{ tittleaccordion() }}</h2>
  <ion-button fill="clear" (click)="toggleAll()">
    {{ allExpanded() ? 'Collapse All' : 'View All' }}
  </ion-button>
</div>

<ion-accordion-group
  #accordionGroup
  [multiple]="true"
  (ionChange)="onAccordionChange($event)"
>
  <ion-accordion
    *ngFor="let item of items(); let i = index"
    [value]="'item-' + i"
    [toggleIcon]="'caret-down-circle'"
    toggleIconSlot="end"
  >
    <ion-item slot="header">
      <ion-label>{{ item.question }}</ion-label>
    </ion-item>

    <div class="ion-padding" slot="content">
      {{ item.answer }}
    </div>
  </ion-accordion>
</ion-accordion-group>
