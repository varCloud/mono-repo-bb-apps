<div class="container-workout-list" style="margin-bottom: 50px">
  @if (!isLoadingComments()) { @for (comment of comments(); track
  comment.workoutId) {
  <lib-comment-list [comments]="comments()"></lib-comment-list>
  } } @else {
  <app-list-skeleton [itemRepeat]="3"></app-list-skeleton>
  }
</div>
<ion-infinite-scroll (ionInfinite)="onIonInfinite($event)">
  <ion-infinite-scroll-content></ion-infinite-scroll-content>
</ion-infinite-scroll>
