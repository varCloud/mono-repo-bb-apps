<div class="app-update">
  <!-- Confeti (CSS puro) -->
  <div class="confetti" aria-hidden="true">
    @for (piece of confetti; track $index) {
      <span
        class="confetti__piece"
        [style.left.%]="piece.left"
        [style.width.px]="piece.size"
        [style.height.px]="piece.size"
        [style.background-color]="piece.color"
        [style.animation-delay.s]="piece.delay"
        [style.animation-duration.s]="piece.duration"
        [style.transform]="'rotate(' + piece.rotate + 'deg)'"
      ></span>
    }
  </div>

  <div class="app-update__content">
    <div class="app-update__badge">
      <ion-icon name="rocket-outline"></ion-icon>
    </div>

    <h2 class="app-update__title">{{ 'app-update.title' | translate }}</h2>
    <p class="app-update__message">{{ 'app-update.message' | translate }}</p>

    <ion-button
      class="app-update__button"
      expand="block"
      shape="round"
      (click)="openStore()"
    >
      {{ 'app-update.update-button' | translate }}
    </ion-button>
  </div>
</div>
