<div class="slider-container">
  @for (card of cards; track card.id) {
  <app-info-card
    [color]="card.color"
    [icon]="card.icon"
    [id]="card.id"
    [name]="card.name"
    [description]="card.description"
    [isSelected]="card.id === selectedCardId"
    (cardClicked)="onCardClicked($event)"
  >
  </app-info-card>
  } @empty {
  <p>No hay tarjetas para mostrar.</p>
  }
</div>
