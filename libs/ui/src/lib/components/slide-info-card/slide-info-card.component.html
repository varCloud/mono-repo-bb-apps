<div class="slider-container">

  @for (card of cards; track card.title) {
    <app-info-card
      [color]="card.color"
      [icon]="card.icon"
      [title]="card.title"
      [subtitle]="card.subtitle"
      [isSelected]="card.title === selectedCardTitle"
      (cardClicked)="onCardClicked($event)">
    </app-info-card>
  } @empty {
    <p>No hay tarjetas para mostrar.</p>
  }

</div>
