<app-modal-header-searchbar
  [titleText]="'conversations.search-title' | translate"
  [placeholderText]="'conversations.find-conversation' | translate"
  (dismiss)="dismiss()"
  (search)="onSearch($event)"
></app-modal-header-searchbar>
<ion-content class="ion-padding" [fullscreen]="true">
  <app-conversation-list
    [userId]="data.userId"
    [userTypeId]="data.userTypeId"
    (conversationSelected)="onConversationSelected($event)"
    [searchTerm]="search"
  >
  </app-conversation-list>
</ion-content>
