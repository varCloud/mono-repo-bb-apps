<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button
        icon="arrow-back-outline"
        class="ion-no-padding back-button-toolbar"
        uppercase="false"
        defaultHref=""
        (click)="cancel()"
        [text]="title() | translate"
      >
      </ion-back-button>
    </ion-buttons>
    <ion-title>
      <ion-img src="{{ logo() }}" alt="" class="app-logo"> </ion-img>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="modal-payment-method-content" [fullscreen]="true">
  <div class="wrapper-payment-method">
    <app-add-payment-method
      [customerId]="idCustomer"
      (succesAddPayment)="succesAddPayment($event)"
    ></app-add-payment-method>
  </div>
</ion-content>
