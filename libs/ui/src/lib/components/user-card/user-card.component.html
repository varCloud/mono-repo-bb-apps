<div class="card-wrapper">
  <img [src]="imageUrl()" [alt]="name()" class="avatar" />

  <div class="card-content">
    <span class="name">{{ name() }} <span class="nickname">({{ nickName() }})</span></span>
    <span class="plan-info">{{ descriptionPlan() }} - ${{ amount() }}</span>
    <span class="subtitle">{{ email() }}</span>
    <span class="next-payment">Próximo pago: {{ endData() | date: 'dd/MM/yyyy' }}</span>
  </div>
  @if(showOptions()){
  <div class="actions">
    <ion-icon name="ellipsis-vertical" class="menu-icon" (click)="onMoreOptions($event)">
    </ion-icon>
  </div>

  }
</div>
