<div class="card-wrapper">

  <img [src]="imageUrl()" [alt]="name()" class="avatar" />

  <div class="card-content">
    <span class="name">{{ name() }}</span>
    <span class="description">{{ descriptionPlan() }}</span>

    <span></span>


  </div>

  <div class="actions">
    <ion-icon
      name="ellipsis-horizontal"
      (click)="onMoreOptions($event)">
    </ion-icon>
  </div>

</div>
