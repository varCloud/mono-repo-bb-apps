<div class="card-wrapper">

  <img [src]="imageUrl()" [alt]="name()" class="avatar" />

  <div class="card-content">
    <span class="name ion-color-primary">{{ name() }} ({{(nickName())}})</span>
    <span class="subtitle">{{ descriptionPlan() }} ${{amount()}} </span>
    <span class="subtitle">Fecha próximo pago {{  endData()| date:'dd/MM'}}</span>
     <span class="subtitle">{{email()}}</span>


    <span></span>


  </div>

  <div class="actions">
    <ion-icon
      name="ellipsis-horizontal"
      (click)="onMoreOptions($event)">
    </ion-icon>
  </div>

</div>
