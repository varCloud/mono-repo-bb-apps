<ion-content class="profile-incomplete-aboutme-content">
  <app-layout-content
    customClass="create-account-page"
    [useGoBack]="true"
    [title]="'go-back' | translate"
  >
    <ion-grid content-header>
      <ion-row>
        <ion-col
          ><app-header
            [text]="'about-me.title' | translate"
            [subtext]="'about-me.subtitle' | translate"
          ></app-header
        ></ion-col>
      </ion-row>
    </ion-grid>
    <ion-grid content-body>
       <ion-row>
          <ion-col size="12">
            <lib-about-me
              [formAboutMe]="bio"
            >
            </lib-about-me>
          </ion-col>
        </ion-row>
    </ion-grid>
    <div content-footer class="ion-text-center">
      <ion-button
        color="tertiary"
        class="bb-input"
        expand="block"
        shape="round"
        (click)="goToNextStep()"
        [disabled]="bio.invalid || isLoading()"
      >
        {{ "next" | translate }}
      </ion-button>
    </div>
  </app-layout-content>
</ion-content>
