<ion-content >
  <app-layout-content
    [title]="'workout.selection-title' | translate"
    [useGoBack]="true"
  >
    <ion-grid content-body class="ion-no-padding">
      <ion-row>
        <ion-col size="12">
          <span class="title">Explorar</span>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="12">
          <span class="subtitle"
            >Selecciona el tipo de entrenamiento que deseas crear</span
          >
        </ion-col>
      </ion-row>
      <app-training-type-selection
        (typeSelected)="onTypeSelected($event)"
      ></app-training-type-selection>
    </ion-grid>
  </app-layout-content>
</ion-content>
