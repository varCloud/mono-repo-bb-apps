<ion-header class="app-header ion-safe-area">
  <div class="header-content ion-safe-area">
    <div class="logo-section">
      <img
        src="./assets/images/logo-con-letras.svg"
        alt="BodyBooster"
        class="app-logo"
      />
    </div>
    <div class="header-actions">
      <ion-button
        fill="clear"
        size="small"
        class="header-icon-btn"
        (click)="openFilter()"
      >
        <ion-icon
          [name]="
            filter.countFilters > 0 ? 'filter-circle' : 'filter-circle-outline'
          "
          slot="icon-only"
          [color]="filter.countFilters > 0 ? 'secondary' : null"
        ></ion-icon>
      </ion-button>
      <ion-button fill="clear" size="small" class="header-icon-btn">
        <ion-icon name="search" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button fill="clear" size="small" class="header-icon-btn">
        <ion-icon name="notifications" slot="icon-only"></ion-icon>
      </ion-button>
    </div>
  </div>
</ion-header>

<ion-content class="workout-home-content ion-safe-area">
  <!-- Biblioteca de ejercicios -->
  <div class="section">
    <div class="section-header">
      <h2>Biblioteca de ejercicios</h2>
    </div>

      <img

        alt="HIIT Workout"
      />
      <div class="card-overlay">
        <div class="card-content">

          <div class="card-stats">

              <span>8.300 seguidores</span>
            </div>
            <span class="separator">•</span>
            <span class="difficulty-text">Intermedio</span>

    @if (workoutMaxLikes()) {
    <lib-card-max-likes [workout]="workoutMaxLikes()!"></lib-card-max-likes>
    }
  </div>
  <ion-grid class="workout-grid">
    <ion-row gap="5px">
      @for (workout of workouts(); track workout.workoutId) {
      <ion-col size="6" size-md="3" size-lg="3">
        <lib-card-list [workout]="workout"></lib-card-list>
      </ion-col>
      }
    </ion-row>
  </ion-grid>
  <ion-fab slot="fixed" vertical="bottom" horizontal="center">
    <ion-button
      expand="block"
      fill="solid"
      class="new-workout-btn"
      color="tertiary"
      (click)="onNewWorkoutClick()"
    >
      <ion-icon src="assets/icons/equipment.svg" slot="start"></ion-icon>
      Nuevo entrenamiento
    </ion-button>
  </ion-fab>
  <ion-infinite-scroll (ionInfinite)="onIonInfinite($event)">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
