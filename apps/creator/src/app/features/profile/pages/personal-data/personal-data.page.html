<ion-content>
  <app-layout-content
    customClass="complete-profile-page"
    [useGoBack]="true"
    [title]="'go-back' | translate"
  >
    <div content-body>
      <ion-grid>
        <ion-row>
          <ion-col size="12">
            <h2 class="title">{{ 'profile.basic-info' | translate }}</h2>
            <lib-app-profile-editor
              [profileForm]="currentUserData"
              [textButton]="'common.save-changes' | translate"
              (imageSelected)="onImageSelected($event)"
            >
            </lib-app-profile-editor>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col size="12">
            <h2 class="title">{{'about-me.title' | translate }}</h2>
            <lib-about-me [formAboutMe]="formAboutMe"></lib-about-me>
          </ion-col>
        </ion-row>
      </ion-grid>
    </div>
    <div content-footer class="ion-padding">
      <ion-button
        shape="round"
        expand="block"
        color="tertiary"
        (click)="saveAllChanges()"
        [disabled]="!isFormsValid()"
      >
        {{ 'common.save-changes' | translate }}
      </ion-button>
    </div>
  </app-layout-content>
</ion-content>
