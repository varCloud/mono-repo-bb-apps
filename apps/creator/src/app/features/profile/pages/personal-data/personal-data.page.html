<app-layout-content customClass="complete-profile-page" [useGoBack]="true" [title]="'go-back' | translate">
  <div content-body>
    <ion-grid>
      <ion-row>
        <ion-col size="12">
          <lib-app-profile-editor *ngIf="currentUserData" [initialData]="currentUserData"
            (saveClicked)="handleSaveProfile($event)">
          </lib-app-profile-editor>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</app-layout-content>
