<ion-content>
  <app-layout-content
    customClass="complete-profile-page"
    [useGoBack]="true"
    [title]="'go-back' | translate"
  >
    <div content-body>
      <ion-grid>
        <ion-row>
          <ion-col size="12">
            <lib-app-profile-editor
              [profileForm]="currentUserData"
              [textButton]="'common.save-changes' | translate"

              (imageSelected)="onImageSelected($event)"
            >
            </lib-app-profile-editor>
          </ion-col>
        </ion-row>

        <ion-row>
          <ion-col size="12">
            <span> Acerca de Mi</span>
          </ion-col>
          <ion-col size="12">

            <lib-about-me
              [formAboutMe]="formAboutMe"
              
            >
            </lib-about-me>
          </ion-col>
        </ion-row>
      </ion-grid>
    </div>
  </app-layout-content>
</ion-content>

<ion-footer class="ion-no-border">
  <div class="ion-padding">
    <ion-button
      shape="round"
      expand="block"
      color="tertiary"
      (click)="saveAllChanges()"
      [disabled]="!isFormsValid()"
    >
      {{ 'common.save-changes' | translate }}
    </ion-button>
  </div>
</ion-footer>
