<ion-header>
  <ion-toolbar class="header-container">
    <app-header-search (clickSearch)="openDetailModal()"></app-header-search>
    <section class="header-info-container">
      <span class="title">Mensajes</span>
      <span class="subTitle"
        >¿Quisieras reportar algún usuario? <span class="contact-link">Contáctanos</span></span
      >
    </section>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-grid content-body class="ion-no-padding" *ngIf="this.sesionService.user$() && reload">
    <app-conversation-list
      [userId]="this.sesionService.user$()!.userId"
      [userTypeId]="this.sesionService.user$()!.userTypeId"
      (conversationSelected)="onConversationSelected($event)"
    >
    </app-conversation-list>
  </ion-grid>
</ion-content>
