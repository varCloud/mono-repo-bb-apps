<ion-content>
  <app-layout-content
    customClass="forgot-password-page"
    [title]="'forgot-password.title' | translate"
    [useGoBack]="true"
  >
    <ion-grid content-body class="ion-no-padding">
      <app-email-input-form
        (emailSubmit)="onEmailSubmit($event)"
      ></app-email-input-form>
    </ion-grid>
    <div content-footer class="ion-text-center">
      <!-- Footer content moved to email-input-form component -->
    </div>
  </app-layout-content>
</ion-content>
