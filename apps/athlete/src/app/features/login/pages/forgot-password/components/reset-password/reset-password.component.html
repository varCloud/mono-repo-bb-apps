<ion-content class="forgot-password-content">
  <app-layout-content
    customClass="forgot-password-page"
    [title]="'reset-password.title' | translate"
    [useGoBack]="true"
  >
    <ion-grid content-body class="ion-no-padding">
      <app-reset-password-form
        [email]="this.email"
        [userTypeId]="userTypeId"
        (resetSuccess)="onResetSuccess($event)"
      ></app-reset-password-form>
    </ion-grid>
  </app-layout-content>
</ion-content>
