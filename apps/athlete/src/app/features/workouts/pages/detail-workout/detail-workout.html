<ion-content class="detail-workout-content ion-no-padding" [fullscreen]="true">
  <div class="header">
    <ion-back-button
      icon="arrow-back-outline"
      class="bb-goback"
      [defaultHref]="
      '/home'
    "
      uppercase="false"
      text=""
    ></ion-back-button>
    <ion-button
      fill="clear"
      size="small"
      class="lovely-btn"
      (click)="toggleFavorite($event)"
    >
      <ion-icon
        [name]="isFavorite() ? 'heart' : 'heart-outline'"
        color="secondary"
        class="bookmark-icon"
      ></ion-icon>
    </ion-button>
  </div>

  <div class="container-header-subscription">
    <img src="assets/images/logo/logo.svg" alt="" class="img-logo" />

    <ion-text class="description" color="white"
      >Obtén acceso a la selección de entrenamientos y clases que se ofrecen en
      la aplicación.</ion-text
    >
  </div>
  <app-layout-content customClass="detail-workout-page">
    <ion-grid content-body>
      <div class="video-container" style="">
        <video #player playsinline controls>
          <source [src]="videoUrl" type="video/mp4" />
          Tu navegador no soporta este video.
        </video>
      </div>

      <ion-button
        color="tertiary"
        class="bb-input"
        expand="block"
        shape="round"
      >
        {{ 'continue' | translate }}
      </ion-button>
    </ion-grid>
  </app-layout-content>
</ion-content>
