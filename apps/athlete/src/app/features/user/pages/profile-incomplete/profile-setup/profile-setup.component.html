<ion-content class="profile-setup-content">
  <app-layout-content
    customClass="profile-setup-page"
    [useGoBack]="true"
    [title]="'common.back' | translate"
  >
    <ion-grid content-header>
      <ion-row>
        <ion-col>
          <app-header
            [text]="'onboarding.profile-setup.title' | translate | uppercase"
            [subtext]="'onboarding.profile-setup.subtitle' | translate"
          ></app-header>
        </ion-col>
      </ion-row>
    </ion-grid>

    <ion-grid content-body>
      <form [formGroup]="form">
        
        <!-- Avatar Picker -->
        <ion-row>
          <ion-col size="12">
            <div class="avatar-section">
              <app-avatar-picker
                [size]="'medium'"
                [disabled]="false"
                (imageChanged)="onImageSelected($event)"
              ></app-avatar-picker>
            </div>
          </ion-col>
        </ion-row>

        <!-- First Name -->
        <ion-row>
          <ion-col size="12">
            <ion-input
              formControlName="firstName"
              class="bb-input"
              [label]="'onboarding.profile-setup.first-name' | translate"
              label-placement="floating"
              fill="outline"
              [placeholder]="'onboarding.profile-setup.first-name-placeholder' | translate"
              type="text"
              mode="md"
            ></ion-input>
            <app-error-message
              [control]="$any(form.get('firstName'))"
            ></app-error-message>
          </ion-col>
        </ion-row>

        <!-- Last Name -->
        <ion-row>
          <ion-col size="12">
            <ion-input
              formControlName="lastName"
              class="bb-input"
              [label]="'onboarding.profile-setup.last-name' | translate"
              label-placement="floating"
              fill="outline"
              [placeholder]="'onboarding.profile-setup.last-name-placeholder' | translate"
              type="text"
              mode="md"
            ></ion-input>
            <app-error-message
              [control]="$any(form.get('lastName'))"
            ></app-error-message>
          </ion-col>
        </ion-row>

        <!-- Nickname -->
        <ion-row>
          <ion-col size="12">
            <ion-input
              formControlName="nickName"
              class="bb-input"
              [label]="'onboarding.profile-setup.nickname' | translate"
              label-placement="floating"
              fill="outline"
              [placeholder]="'onboarding.profile-setup.nickname-placeholder' | translate"
              type="text"
              mode="md"
            ></ion-input>
            <app-error-message
              [control]="$any(form.get('nickName'))"
            ></app-error-message>
          </ion-col>
        </ion-row>

        <!-- Phone -->
        <ion-row>
          <ion-col size="12">
            <app-input-phone
              [control]="$any(form.get('phone'))"
              [isoCode]="isoCode()"
              (maskSelected)="onMaskSelected($event)"
            ></app-input-phone>
          </ion-col>
        </ion-row>

        <!-- Profile Color -->
        <ion-row>
          <ion-col size="12">
            <ion-item lines="none" button="" (click)="openColorPicker()">
              <ion-label class="label">
                {{ "onboarding.profile-setup.profile-color" | translate }}
              </ion-label>
              <input
                formControlName="profileColor"
                type="color"
                class="custom-color-input"
                #colorPicker
              />
            </ion-item>
            <app-error-message
              [control]="$any(form.get('profileColor'))"
            ></app-error-message>
          </ion-col>
        </ion-row>

      </form>
    </ion-grid>

    <div content-footer class="ion-text-center">
      <ion-button
        color="tertiary"
        class="bb-input"
        expand="block"
        shape="round"
        [disabled]="form.invalid || isLoading()"
        (click)="onFinishOnboarding()"
      >
        {{ "onboarding.profile-setup.finish-button" | translate }}
      </ion-button>
    </div>
  </app-layout-content>
</ion-content>
