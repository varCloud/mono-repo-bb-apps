<ion-content class="select-level-content">
  <app-layout-content
    customClass="select-level-page"
    [useGoBack]="true"
    [title]="'common.back' | translate"
  >
    <ion-grid content-header>
      <ion-row>
        <ion-col>
          <app-header
            [text]="'onboarding.select-level.title' | translate | uppercase"
            [subtext]="'Elige tu nivel de actividad habitual. Ayuda a que tus entrenadores te conozcan mejor' | translate"
          ></app-header>
        </ion-col>
      </ion-row>
    </ion-grid>

    <ion-grid content-body>
      <form [formGroup]="form">
        
        <!-- Selección de Nivel de Actividad -->
        <ion-row>
          <ion-col size="12">
            <div class="section-title">
              <h3>{{ 'onboarding.select-level.level-title' | translate }}</h3>
              <p class="subtitle">{{ 'onboarding.select-level.level-subtitle' | translate }}</p>
            </div>
            
            <app-radio-list-selector
              [options]="activityLevelOptions()"
              [value]="form.get('activityLevel')?.value"
              (valueChange)="onActivityLevelChange($event)"
            ></app-radio-list-selector>
            
            <app-error-message
              [control]="$any(form.get('activityLevel'))"
            ></app-error-message>
          </ion-col>
        </ion-row>
      </form>
    </ion-grid>

    <div content-footer class="ion-text-center">
      <ion-button
        color="tertiary"
        class="bb-input"
        expand="block"
        shape="round"
        [disabled]="form.invalid"
        (click)="onContinue()"
      >
        {{ "common.continue" | translate }}
      </ion-button>
    </div>
  </app-layout-content>
</ion-content>
