<ion-content class="payment-methods-content">
  <app-layout-content customClass="payment-methods-page">
    <ion-grid content-body>
      <form>
        <ion-grid>
          <ion-row>
            <ion-col size="12">
              <ion-button
                color="tertiary"
                class="bb-input"
                expand="block"
                shape="round"
                (click)="openModalAddPaymentMethod()"
              >
                {{ 'add-payment-method' | translate }}
              </ion-button>
            </ion-col>
          </ion-row>
        </ion-grid>
      </form>
    </ion-grid>
  </app-layout-content>
</ion-content>
