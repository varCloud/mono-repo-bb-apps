


<ion-content content-body [fullscreen]="true" class="ion-padding">

<ion-header class="ion-no-border">
  <ion-toolbar>
    <img src="assets/images/logo/logo.svg" alt="BodyBooster Logo" slot="start" class="header-logo" />

    <ion-buttons slot="end">
      <ion-button (click)="openSearchModal()">
        <ion-icon slot="icon-only" name="search-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>


  <ion-list  [lines]="'none'" >

    @for (sub of subscriptions(); track sub.id) {

      <lib-user-card
        [imageUrl]="sub.imageUrl"
        [name]="sub.name"
        [description]="sub.description"
        [tagText]="sub.tag"
        [tagColor]="sub.tagBg"
        [tagTextColor]="sub.tagText"
        (optionsClick)="onShowOptions(sub, $event)"
        class="card-item"
      >
      </lib-user-card>

    } @empty {
      <p style="padding: 20px;">No tienes suscripciones activas.</p>
    }

  </ion-list>
</ion-content>
